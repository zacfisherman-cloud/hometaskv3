<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Home Tasks</title>
<meta name="theme-color" id="meta-theme" content="#10131C">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="app.js" defer></script>
<script>
  // Offline shell (sw.js). Registration failure (e.g. dev harness) is fine.
  if('serviceWorker' in navigator)
    addEventListener('load', ()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
</script>
</head>
<body>
<div id="root">

  <!-- ── Setup ─────────────────────────────────── -->
  <div id="setup">
    <div class="setup-top">
      <div class="logo-mark">
        <i data-lucide="house-plus"></i>
        <span class="spark"><i data-lucide="sparkles"></i></span>
      </div>
      <div><div class="wordmark">Home <span>Tasks</span></div></div>
      <p class="setup-tag">Weekly chores,&nbsp;together.</p>
    </div>
    <div class="setup-form" id="setup-create">
      <div>
        <p class="field-label">Your name</p>
        <div class="field"><i data-lucide="user" class="ic"></i>
          <input id="inp-name1" type="text" placeholder="Your name" autocomplete="given-name"></div>
      </div>
      <div>
        <p class="field-label">Partner's name</p>
        <div class="field"><i data-lucide="users" class="ic"></i>
          <input id="inp-name2" type="text" placeholder="Partner's name" autocomplete="off"></div>
      </div>
      <div>
        <p class="field-label">Your email <span class="opt-lbl">(optional)</span></p>
        <div class="field"><i data-lucide="mail" class="ic"></i>
          <input id="inp-email1" type="email" placeholder="your@email.com" autocomplete="email"></div>
      </div>
      <div>
        <p class="field-label">Partner's email <span class="opt-lbl">(optional)</span></p>
        <div class="field"><i data-lucide="mail" class="ic"></i>
          <input id="inp-email2" type="email" placeholder="partner@email.com" autocomplete="off"></div>
      </div>
      <p class="setup-opt-note">Optional — used for Calendar invite links &amp; reminders</p>
      <button class="btn-primary" id="setup-go">Get Started <i data-lucide="arrow-right"></i></button>
      <p class="setup-foot">Tip: tap <b>Share → Add to Home Screen</b> for the best experience</p>
    </div>
    <div class="setup-form hidden" id="setup-rolepick"></div>
  </div>

  <!-- ── App ───────────────────────────────────── -->
  <div id="app" hidden>
    <div id="hdr"></div>
    <div id="mini-hdr">
      <div class="mh-tabs">
        <button class="mh-tab active" id="mh-tasks-btn"><i data-lucide="list-checks"></i>Tasks</button>
        <button class="mh-tab" id="mh-rooms-btn"><i data-lucide="layout-grid"></i>Rooms</button>
      </div>
      <div class="mh-actions">
        <button class="mh-hist-btn" id="mh-hist-btn" aria-label="Completed history"><i data-lucide="history"></i></button>
        <button class="mh-add-btn" id="mh-add-btn"><i data-lucide="plus"></i></button>
      </div>
    </div>
    <div id="panel"></div>
    <nav id="bnav">
      <button class="ni active" data-tab="tasks">
        <span class="ni-ic"><i data-lucide="list-checks"></i></span><span class="ni-lb">Tasks</span>
      </button>
      <button class="ni" data-tab="dates">
        <span class="ni-ic"><i data-lucide="heart"></i></span><span class="ni-lb">Dates</span>
      </button>
      <button class="ni" data-tab="meals">
        <span class="ni-ic"><i data-lucide="chef-hat"></i></span><span class="ni-lb">Meals</span>
      </button>
      <button class="ni" data-tab="history">
        <span class="ni-ic"><i data-lucide="bar-chart-2"></i></span><span class="ni-lb">Stats</span>
      </button>
      <button class="ni" data-tab="settings">
        <span class="ni-ic"><i data-lucide="settings"></i></span><span class="ni-lb">Settings</span>
      </button>
    </nav>
  </div>

  <!-- ── Sheet overlay ─────────────────────────── -->
  <div id="overlay" class="hidden">
    <div id="dim"></div>
    <div id="sheet"></div>
  </div>

  <!-- ── Modal overlay ─────────────────────────── -->
  <div id="modal-layer" class="hidden">
    <div id="mdim"></div>
    <div id="mbox"></div>
  </div>
</div>
</body>
</html>
