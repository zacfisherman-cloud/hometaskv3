<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Home Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
/* ── tokens ───────────────────────────────────────────────── */
:root{
  --sky:#2BC2F2; --sky-deep:#14A6DA; --sky-soft:#E7F6FD; --sky-tint:#F1FAFE;
  --ink:#2C3D4E; --ink-soft:#5A6B7B; --muted:#9AAAB8; --line:#EAF1F6;
  --card:#fff; --page:#EAF3FA;
  --green:#28C26E; --green-soft:#DAF6E7;
  --gold:#F7B500;  --gold-soft:#FFF1CC;
  --red:#FF4757;   --red-soft:#FFECEE;
  --r-card:26px; --r-pill:999px; --r-input:18px;
  --sh-sm:0 6px 18px rgba(43,109,150,.08);
  --sh-md:0 14px 34px rgba(43,109,150,.12);
  --sh-lg:0 26px 60px rgba(33,90,128,.18);
  --font:'Quicksand',system-ui,sans-serif;
  --disp:'Fredoka','Quicksand',sans-serif;
  --bnav:80px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html,body{height:100%;height:100dvh;background:#B8CFD9}
body{font-family:var(--font);color:var(--ink);display:flex;justify-content:center;height:100%;height:100dvh}
button{font-family:var(--font);cursor:pointer;border:none;background:none}
input,textarea,select{font-family:var(--font);outline:none}
a{color:inherit;text-decoration:none}

/* ── shell ────────────────────────────────────────────────── */
#root{
  width:100%;max-width:430px;height:100%;height:100dvh;
  background:var(--page);display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

/* ── setup ────────────────────────────────────────────────── */
#setup{
  flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;
  padding:calc(env(safe-area-inset-top) + 16px) 24px calc(env(safe-area-inset-bottom) + 16px);
  background:radial-gradient(520px 360px at 50% -8%,#DFF4FE 0%,transparent 70%),
    linear-gradient(180deg,#F4FBFF 0%,#EAF4FB 100%);
  overflow:hidden;
}
.setup-top{display:flex;flex-direction:column;align-items:center;gap:6px;padding-top:0}
.logo-mark{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(155deg,#46CEF6 0%,#1AA6DD 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 16px 28px rgba(28,168,219,.38),inset 0 2px 0 rgba(255,255,255,.45);position:relative;
}
.logo-mark svg{width:32px;height:32px;color:#fff}
.logo-mark .spark{position:absolute;top:-5px;right:-5px;width:22px;height:22px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-sm)}
.logo-mark .spark svg{width:13px;height:13px;color:var(--gold)}
.wordmark{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:-.01em;color:var(--ink);text-align:center}
.wordmark span{color:var(--sky)}
.setup-tag{margin-top:0;font-size:12.5px;font-weight:600;color:var(--ink-soft);text-align:center;line-height:1.4}
.setup-form{display:flex;flex-direction:column;gap:8px}
.field-label{font-size:12px;font-weight:700;color:var(--ink-soft);margin:0 0 3px 6px;display:flex;align-items:center;gap:5px}
.opt-lbl{font-size:11px;font-weight:500;color:var(--muted)}
.setup-opt-note{font-size:11px;font-weight:500;color:var(--muted);text-align:center;line-height:1.4;margin-top:0}
.field{position:relative}
.field .ic{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--sky)}
.field input{width:100%;height:46px;border:1.5px solid var(--line);border-radius:var(--r-input);background:#fff;padding:0 16px 0 44px;font-weight:600;font-size:14.5px;color:var(--ink);box-shadow:var(--sh-sm)}
.field input::placeholder{color:var(--muted);font-weight:500}
.field input:focus{border-color:var(--sky);box-shadow:0 0 0 4px var(--sky-soft)}
.btn-primary{
  width:100%;height:52px;border-radius:var(--r-pill);font-weight:700;font-size:16px;color:#fff;
  background:linear-gradient(150deg,#3DC9F5 0%,#16A6DC 100%);
  box-shadow:0 14px 28px rgba(25,166,221,.4),inset 0 2px 0 rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;gap:10px;margin-top:2px;transition:opacity .15s;
}
.btn-primary:active{opacity:.85}
.btn-primary svg{width:20px;height:20px}
.setup-foot{text-align:center;font-size:11px;font-weight:600;color:var(--muted);line-height:1.5;margin-top:0}
.setup-foot b{color:var(--sky-deep)}

/* ── app layout ───────────────────────────────────────────── */
#app[hidden]{display:none!important}
#app{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#panel{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--bnav) + env(safe-area-inset-bottom) + 8px)}
#panel::-webkit-scrollbar{display:none}

/* ── tasks header ─────────────────────────────────────────── */
.tasks-hdr{
  flex:0 0 auto;padding:calc(env(safe-area-inset-top) + 12px) 24px 14px;
  background:linear-gradient(160deg,#36C8F4 0%,#16AADD 100%);
  border-radius:0 0 34px 34px;color:#fff;
  box-shadow:0 16px 30px rgba(22,168,221,.26);
}
.hh-top{display:flex;align-items:center;justify-content:space-between}
.hh-hello{font-size:15px;font-weight:600;color:rgba(255,255,255,.86);line-height:1}
.hh-name{font-family:var(--disp);font-weight:700;font-size:27px;line-height:1.05;margin-top:3px}
.hh-avatar{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;flex:0 0 42px}
.hh-avatar svg{width:22px;height:22px;color:#fff}
/* progress ring — transparent on blue, all white */
.progress-card{
  position:relative;margin-top:12px;padding:2px 4px;display:flex;align-items:center;gap:18px;
}
.ring{position:relative;width:78px;height:78px;flex:0 0 78px}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .pct b{font-family:var(--disp);font-weight:700;font-size:21px;line-height:1;color:#fff}
.ring .pct span{font-size:10px;font-weight:700;color:rgba(255,255,255,.82);letter-spacing:.04em}
.prog-meta{flex:1}
.prog-meta .wk{font-size:13px;font-weight:700;letter-spacing:.04em;color:rgba(255,255,255,.85);text-transform:uppercase}
.prog-meta .big{font-family:var(--disp);font-weight:600;font-size:19px;margin:2px 0 1px;color:#fff}
.prog-meta .sub{font-size:13.5px;font-weight:600;color:rgba(255,255,255,.9)}
.prog-meta .sub b{color:#fff}

/* ── flat header (History, Calendar, Dates, Settings) ──────── */
.flat-hdr{
  flex:0 0 auto;padding:calc(env(safe-area-inset-top) + 14px) 24px 18px;
  background:linear-gradient(160deg,#36C8F4 0%,#16AADD 100%);
  border-radius:0 0 34px 34px;color:#fff;
  box-shadow:0 16px 30px rgba(22,168,221,.26);
  display:flex;align-items:center;justify-content:space-between;
}
.flat-hdr-title{font-family:var(--disp);font-weight:700;font-size:26px}
.flat-hdr-sub{font-size:13.5px;font-weight:600;color:rgba(255,255,255,.8);margin-top:3px}
.flat-hdr-icon{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center}
.flat-hdr-icon svg{width:22px;height:22px;color:#fff}

/* ── scroll-collapse header (header is already minimal — no collapse needed) ── */

/* ── native feel ─────────────────────────────────────────── */
*{-webkit-tap-highlight-color:transparent}
button,a,[class$="-tile"],[class$="-row"]{touch-action:manipulation}
#panel{-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
#root{overscroll-behavior:none}
.ni,.tv-chip,.chip,.badge{user-select:none;-webkit-user-select:none}

/* ── day group headers ────────────────────────────────────── */
.day-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 10px;
}
.day-label{font-family:var(--disp);font-weight:600;font-size:20px;color:var(--ink)}
.day-label.today-lbl{color:var(--sky-deep)}
.day-label.overdue-lbl{color:var(--red)}
.day-date-pill{
  font-size:12px;font-weight:700;color:var(--ink-soft);
  background:var(--card);border-radius:var(--r-pill);padding:4px 12px;
  box-shadow:var(--sh-sm);
}

/* ── task card ────────────────────────────────────────────── */
.task-card{
  background:var(--card);border-radius:var(--r-card);margin:0 16px 12px;
  box-shadow:var(--sh-md);position:relative;overflow:hidden;cursor:pointer;
  animation:fadeUp .18s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.task-card::before{content:"";position:absolute;left:0;top:16px;bottom:16px;width:5px;border-radius:0 4px 4px 0}
.task-card.easy::before{background:var(--green)}
.task-card.medium::before{background:var(--gold)}
.task-card.hard::before{background:var(--red)}

.tc-inner{padding:16px 16px 14px}
.tc-top{display:flex;align-items:flex-start;gap:12px}
.tc-icon{width:46px;height:46px;border-radius:14px;flex:0 0 46px;display:flex;align-items:center;justify-content:center}
.tc-icon svg{width:23px;height:23px}
.easy .tc-icon{background:var(--green-soft);color:var(--green)}
.medium .tc-icon{background:var(--gold-soft);color:#C98A00}
.hard .tc-icon{background:var(--red-soft);color:var(--red)}

.tc-main{flex:1;min-width:0}
.tc-title{font-family:var(--disp);font-weight:600;font-size:17.5px;color:var(--ink);line-height:1.2}
.tc-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.badge{display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 9px 0 7px;border-radius:var(--r-pill);font-size:11px;font-weight:700}
.badge svg{width:11px;height:11px}
.badge-who{background:var(--sky-soft);color:var(--sky-deep)}
.badge-freq{background:var(--line);color:var(--ink-soft)}
.badge-dc{background:#F0E8FF;color:#7C3AED}
.badge-dc svg{color:#7C3AED}
.tc-due{display:flex;align-items:center;gap:5px;margin-top:7px;font-size:12.5px;font-weight:700}
.tc-due svg{width:13px;height:13px}
.tc-due.due-today{color:var(--sky-deep)}
.tc-due.due-soon{color:var(--ink-soft)}
.tc-due.due-overdue{color:var(--red)}
.tc-diff{flex:0 0 auto;padding-top:2px}
.diff-dot{width:9px;height:9px;border-radius:50%}
.easy .diff-dot{background:var(--green)}
.medium .diff-dot{background:var(--gold)}
.hard .diff-dot{background:var(--red)}

.tc-actions{display:flex;gap:8px;margin-top:12px}
.tc-act{
  flex:1;height:36px;border-radius:12px;font-weight:700;font-size:12.5px;
  display:flex;align-items:center;justify-content:center;gap:5px;
  border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);transition:all .12s;
}
.tc-act svg{width:13px;height:13px}
.tc-act.done-act{background:var(--green);border-color:var(--green);color:#fff}
.tc-act.done-act:active{filter:brightness(.9)}

.cal-btn{
  display:flex;align-items:center;gap:6px;margin-top:10px;padding:8px 12px;
  border-radius:12px;background:var(--sky-soft);color:var(--sky-deep);
  font-weight:700;font-size:12.5px;transition:background .12s;
}
.cal-btn:active{background:#D0EEFB}
.cal-btn svg{width:14px;height:14px}

/* ── empty state ──────────────────────────────────────────── */
.empty-state{padding:48px 24px;text-align:center;color:var(--muted)}
.empty-state svg{width:48px;height:48px;margin-bottom:14px;color:var(--line)}
.empty-state p{font-weight:600;font-size:15px}

/* ── bottom nav ───────────────────────────────────────────── */
#bnav{
  position:absolute;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(4,1fr);align-items:start;
  padding:10px 4px 0;padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -10px 30px rgba(43,109,150,.06);z-index:50;
}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);padding:0;transition:color .15s}
.ni .ni-ic{width:38px;height:38px;border-radius:13px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.ni svg{width:22px;height:22px}
.ni .ni-lb{font-size:10px;font-weight:700;letter-spacing:.01em}
.ni.active{color:var(--sky-deep)}
.ni.active .ni-ic{background:var(--sky-soft)}

/* ── history tab ──────────────────────────────────────────── */
.hist-card{background:var(--card);border-radius:var(--r-card);padding:18px 20px;margin:0 16px 14px;box-shadow:var(--sh-sm)}
.hist-week{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.hist-pct{font-family:var(--disp);font-weight:700;font-size:24px;color:var(--ink)}
.hist-bar{height:12px;border-radius:6px;background:var(--line);overflow:hidden;margin:10px 0}
.hist-bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#34D17E,#19B25E);transition:width .4s}
.hist-items{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.hist-item{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--ink-soft)}
.hist-item svg{width:14px;height:14px;flex:0 0 14px}
.hist-item .hi-name{flex:1;color:var(--ink)}
.hist-item .hi-diff{font-size:11.5px;padding:2px 8px;border-radius:var(--r-pill);font-weight:700}
.hi-easy{background:var(--green-soft);color:var(--green)}
.hi-medium{background:var(--gold-soft);color:#C98A00}
.hi-hard{background:var(--red-soft);color:var(--red)}

/* ── calendar tab ─────────────────────────────────────────── */
.cal-day-card{background:var(--card);border-radius:20px;padding:14px 16px;margin:0 16px 10px;box-shadow:var(--sh-sm)}
.cal-day-lbl{font-size:12.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.cal-today-dot{width:7px;height:7px;border-radius:50%;background:var(--sky);flex:0 0 7px}
.cal-task-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
.cal-task-row:last-child{border-bottom:none}
.cal-dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.cal-task-name{font-weight:600;font-size:13.5px;color:var(--ink);flex:1}
.cal-badge-who{font-size:11px;font-weight:700;color:var(--sky-deep);background:var(--sky-soft);border-radius:var(--r-pill);padding:2px 8px}
.cal-diff{font-size:11px;font-weight:700;border-radius:var(--r-pill);padding:2px 8px}
.gcal-notice{background:var(--card);border-radius:var(--r-card);margin:0 16px 14px;padding:20px;box-shadow:var(--sh-sm);text-align:center}
.gcal-notice svg{width:32px;height:32px;color:var(--sky);margin-bottom:10px}
.gcal-notice p{font-size:13.5px;font-weight:600;color:var(--ink-soft);line-height:1.55}

/* ── dates tab ────────────────────────────────────────────── */
.pick-hero{
  margin:20px 16px 0;width:calc(100% - 32px);height:68px;border-radius:22px;
  background:linear-gradient(150deg,#FF4757,#C0392B);
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-weight:700;font-size:19px;color:#fff;
  box-shadow:0 16px 30px rgba(192,57,43,.4),inset 0 2px 0 rgba(255,255,255,.3);
  transition:opacity .15s;
}
.pick-hero:active{opacity:.85}
.pick-hero svg{width:22px;height:22px}
.search-wrap-row{display:flex;align-items:center;gap:10px;padding:14px 16px 0}
.search-box{position:relative;flex:1}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--sky)}
.search-input{width:100%;height:50px;border:1.5px solid var(--line);border-radius:16px;background:#fff;padding:0 14px 0 44px;font-weight:600;font-size:15px;color:var(--ink);box-shadow:var(--sh-sm)}
.search-input:focus{border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-soft)}
.search-results-panel{background:#fff;border-radius:20px;margin:10px 16px 0;box-shadow:var(--sh-md);overflow:hidden;display:none}
.search-result-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
.search-result-row:last-child{border-bottom:none}
.search-result-row:active{background:var(--sky-tint)}
.search-result-row svg{width:16px;height:16px;color:var(--sky-deep);flex:0 0 16px}
.sr-name{font-weight:700;font-size:14px;color:var(--ink)}
.sr-addr{font-size:12px;font-weight:600;color:var(--muted);margin-top:1px}
.search-loc-bar{
  display:flex;align-items:center;gap:6px;
  margin:6px 16px 0;padding:8px 12px;
  background:#fff;border-radius:12px;border:1.5px solid var(--line);
  box-shadow:var(--sh-sm);
}
.search-loc-bar svg{width:14px;height:14px;color:var(--sky-deep);flex:0 0 14px}
.search-loc-lbl{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
.search-loc-input{
  flex:1;border:none;background:transparent;font-size:13px;font-weight:700;
  color:var(--sky-deep);font-family:var(--font);min-width:0;padding:0;
}
.search-loc-input::placeholder{color:var(--muted);font-weight:600;font-size:12px}
.sec-row{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px}
.sec-title{font-family:var(--disp);font-weight:600;font-size:20px;color:var(--ink)}
.sec-count{font-size:13px;font-weight:700;color:var(--muted)}
.date-card{background:var(--card);border-radius:var(--r-card);padding:16px;margin:0 16px 12px;box-shadow:var(--sh-sm)}
.date-card.picked-highlight{border:2px solid var(--gold);box-shadow:0 0 0 4px var(--gold-soft),var(--sh-md)}
.picked-tag{display:inline-flex;align-items:center;gap:5px;background:var(--gold-soft);color:#B47A00;border-radius:var(--r-pill);padding:4px 10px;font-size:11.5px;font-weight:700;margin-bottom:10px}
.picked-tag svg{width:13px;height:13px;color:var(--gold)}
.date-top{display:flex;align-items:flex-start;gap:12px}
.date-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:0 0 44px}
.date-icon.pending-icon{background:var(--sky-soft);color:var(--sky-deep)}
.date-icon.visited-icon{background:var(--green-soft);color:var(--green)}
.date-icon svg{width:22px;height:22px}
.date-info{flex:1;min-width:0}
.date-name{font-family:var(--disp);font-weight:600;font-size:17px;color:var(--ink)}
.date-addr-link{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:13px;font-weight:600;color:var(--sky-deep);cursor:pointer}
.date-addr-link svg{width:13px;height:13px;flex:0 0 13px}
.date-stars{display:flex;gap:3px;margin-top:6px}
.date-stars svg{width:15px;height:15px}
.star-filled{color:var(--gold);fill:var(--gold)}
.star-empty{color:var(--line);fill:var(--line)}
.date-notes-text{font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-top:5px;font-style:italic}
.date-visited-on{font-size:11.5px;font-weight:700;color:var(--muted);margin-top:4px}
.date-actions{display:flex;gap:8px;margin-top:12px}
.date-act{flex:1;height:36px;border-radius:12px;font-weight:700;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:5px;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);transition:all .12s}
.date-act svg{width:13px;height:13px}
.date-act.visited-act{background:var(--green);border-color:var(--green);color:#fff}
.date-act.del-act{background:var(--red);border-color:var(--red);color:#fff}
.export-btn{
  margin:0 16px 14px;width:calc(100% - 32px);height:46px;border-radius:14px;
  border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:14px;color:var(--sky-deep);
  display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--sh-sm);
}
.export-btn svg{width:15px;height:15px}

/* ── settings tab ─────────────────────────────────────────── */
.settings-card{background:var(--card);border-radius:var(--r-card);margin:0 16px 14px;box-shadow:var(--sh-sm);overflow:hidden}
.srow{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line);cursor:pointer}
.srow:last-child{border-bottom:none}
.srow-icon{width:38px;height:38px;border-radius:12px;background:var(--sky-soft);color:var(--sky-deep);display:flex;align-items:center;justify-content:center;flex:0 0 38px}
.srow-icon svg{width:19px;height:19px}
.srow-icon.red-icon{background:var(--red-soft);color:var(--red)}
.srow-info{flex:1}
.srow-label{font-weight:700;font-size:15px;color:var(--ink)}
.srow-sub{font-size:12.5px;font-weight:600;color:var(--muted);margin-top:1px}
.srow.danger .srow-label{color:var(--red)}
.srow-chev svg{width:17px;height:17px;color:var(--muted)}

/* ── tasks sub-view toggle (tasks/rooms) ───────────────────── */
.tasks-view-row{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 0;gap:8px}
.tasks-view-chips{display:flex;gap:4px;background:#fff;border:1.5px solid var(--line);border-radius:var(--r-pill);padding:4px;box-shadow:var(--sh-sm)}
.tv-chip{height:34px;padding:0 16px;border:none;background:transparent;border-radius:var(--r-pill);font-family:var(--font);font-weight:700;font-size:13.5px;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap}
.tv-chip svg{width:15px;height:15px}
.tv-chip.sel{background:var(--sky-soft);color:var(--sky-deep)}
.tab-add-btn{width:38px;height:38px;border-radius:50%;background:var(--sky);display:flex;align-items:center;justify-content:center;color:#fff;transition:background .15s;flex:0 0 38px;box-shadow:0 6px 14px rgba(25,166,221,.38)}
.tab-add-btn:active{background:var(--sky-deep)}
.tab-add-btn svg{width:18px;height:18px}
.hist-btn{height:32px;border-radius:var(--r-pill);padding:0 14px;font-weight:700;font-size:12.5px;color:#fff;background:var(--gold);display:flex;align-items:center;gap:5px;transition:opacity .15s;white-space:nowrap;box-shadow:0 3px 10px rgba(247,181,0,.4)}
.hist-btn svg{width:13px;height:13px}
.hist-btn:active,.hist-btn.hist-active{opacity:.82}
.cal-detail-btn{display:flex;align-items:center;justify-content:center;gap:8px;height:46px;border-radius:14px;background:var(--sky-soft);color:var(--sky-deep);font-weight:700;font-size:14px;transition:background .12s}
.cal-detail-btn:active{background:#D0EEFB}
.cal-detail-btn svg{width:17px;height:17px}
/* ── gcal card (edit sheet) ──────────────────────────────── */
.gcal-card{
  display:flex;align-items:center;gap:14px;padding:13px 15px;border-radius:18px;
  background:#fff;border:1.5px solid var(--line);box-shadow:var(--sh-sm);
  text-decoration:none;transition:transform .12s,box-shadow .12s;
}
.gcal-card:active{transform:scale(.97);box-shadow:none}
.gcal-card-icon{
  width:44px;height:44px;border-radius:13px;flex:0 0 44px;
  background:linear-gradient(140deg,#5AA4F8 0%,#1A73E8 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(26,115,232,.34);
}
.gcal-card-icon svg{width:21px;height:21px;color:#fff}
.gcal-card-text{flex:1;min-width:0}
.gcal-card-title{font-weight:700;font-size:14.5px;color:var(--ink);line-height:1.2}
.gcal-card-sub{font-size:12px;font-weight:600;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcal-card-arrow{flex:0 0 auto;width:28px;height:28px;border-radius:9px;background:var(--page);display:flex;align-items:center;justify-content:center}
.gcal-card-arrow svg{width:14px;height:14px;color:var(--ink-soft)}
/* ── rooms tab ──────────────────────────────────────────────── */
.room-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px 16px 0}
.room-tile{background:var(--card);border-radius:var(--r-card);padding:18px 14px 14px;box-shadow:var(--sh-sm);cursor:pointer;transition:transform .12s;display:flex;flex-direction:column;gap:8px;position:relative}
.room-tile:active{transform:scale(.97)}
.room-tile-icon{width:46px;height:46px;border-radius:14px;background:var(--sky-soft);color:var(--sky-deep);display:flex;align-items:center;justify-content:center}
.room-tile-icon svg{width:23px;height:23px}
.room-tile-name{font-family:var(--disp);font-weight:600;font-size:15px;color:var(--ink);line-height:1.2}
.room-badge{position:absolute;top:11px;right:11px;background:var(--sky-deep);color:#fff;border-radius:var(--r-pill);padding:2px 8px;font-size:11px;font-weight:700;min-width:18px;text-align:center}
.room-badge.zero{background:var(--line);color:var(--muted)}
.room-back{display:flex;align-items:center;gap:8px;padding:16px 20px 8px;font-weight:700;font-size:15px;color:var(--sky-deep);cursor:pointer;background:none;border:none;width:100%;text-align:left}
.room-back svg{width:18px;height:18px}
.chip-sm{font-size:11px;height:40px;gap:3px;padding:0 5px}
.chip-sm svg{width:13px;height:13px}
/* ── wheel overlay ──────────────────────────────────────────── */
#wheel-overlay{position:fixed;inset:0;z-index:500;background:rgba(10,18,28,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;animation:fadeIn .2s}
#wheel-dismiss-btn{position:absolute;top:18px;right:18px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.18)}
.wh-title{font-family:var(--disp);font-weight:700;font-size:20px;color:#fff;letter-spacing:-.01em;text-align:center}
.wheel-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.wheel-ptr{position:absolute;top:-16px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:11px solid transparent;border-right:11px solid transparent;border-top:20px solid var(--gold);z-index:10;filter:drop-shadow(0 2px 8px rgba(247,181,0,.7))}
#wcanvas{display:block;box-shadow:0 0 0 4px rgba(255,255,255,.12),0 24px 60px rgba(0,0,0,.6);border-radius:50%}
.wheel-result{background:#fff;border-radius:24px;padding:24px 20px;width:calc(100% - 48px);max-width:360px;text-align:center;animation:modalIn .3s ease}
.wres-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gold-soft);color:#8B6200;border-radius:var(--r-pill);padding:4px 12px;font-size:12px;font-weight:700;margin-bottom:10px}
.wres-badge svg{width:13px;height:13px;fill:var(--gold);color:var(--gold)}
.wres-name{font-family:var(--disp);font-weight:700;font-size:22px;color:var(--ink);margin-bottom:6px}
.wres-addr{display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px;font-weight:600;color:var(--sky-deep);margin-bottom:18px;cursor:pointer;flex-wrap:wrap}
.wres-addr svg{width:13px;height:13px;flex:0 0 13px}
.wres-btns{display:flex;gap:10px}
.wres-btn{flex:1;height:48px;border-radius:14px;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft)}
.wres-btn svg{width:15px;height:15px}
.wres-btn.primary{background:linear-gradient(150deg,#3DC9F5,#16A6DC);border:none;color:#fff;box-shadow:0 8px 20px rgba(25,166,221,.35),inset 0 2px 0 rgba(255,255,255,.4)}
.confetti-dot{position:fixed;border-radius:2px;pointer-events:none;z-index:600;animation:cfDrop 1.4s ease-out forwards}
@keyframes cfDrop{0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(600deg) scale(0)}}
/* ── overlay / sheet ──────────────────────────────────────── */
#overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;align-items:center}
#overlay.hidden{display:none}
#dim{position:absolute;inset:0;background:rgba(20,46,66,.44);backdrop-filter:blur(1.5px);animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#sheet{
  position:relative;width:100%;max-width:430px;background:#fff;border-radius:30px 30px 0 0;
  padding:14px 24px 48px;box-shadow:0 -20px 50px rgba(20,46,66,.22);
  display:flex;flex-direction:column;gap:16px;max-height:92vh;overflow-y:auto;
  animation:slideUp .22s ease;
}
#sheet::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.grabber{width:44px;height:5px;border-radius:3px;background:#DBE5EC;margin:2px auto 4px}
.sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.sheet-title{font-family:var(--disp);font-weight:600;font-size:22px;color:var(--ink)}
.sheet-close{width:36px;height:36px;border-radius:12px;background:var(--sky-tint);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);flex:0 0 36px}
.sheet-close svg{width:18px;height:18px}
.seg-lbl{font-size:13.5px;font-weight:700;color:var(--ink-soft);margin:0 0 10px 4px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  flex:1;min-width:0;height:44px;border-radius:14px;border:1.5px solid var(--line);background:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--ink-soft);
  cursor:pointer;transition:all .12s;white-space:nowrap;padding:0 8px;
}
.chip.sel{background:var(--sky-soft);border-color:var(--sky);color:var(--sky-deep)}
.chip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sheet-field{position:relative}
.sheet-field .ic{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:19px;height:19px;color:var(--sky)}
.sheet-field input,.sheet-field select{
  width:100%;height:56px;border:1.5px solid var(--line);border-radius:var(--r-input);
  background:#fff;padding:0 16px 0 46px;font-weight:600;font-size:15.5px;color:var(--ink);box-shadow:var(--sh-sm);
}
.sheet-field input::placeholder{color:var(--muted);font-weight:500}
.sheet-field input:focus,.sheet-field select:focus{border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-soft)}
.sheet-date-input{
  width:100%;height:52px;border:1.5px solid var(--line);border-radius:var(--r-input);
  background:#fff;padding:0 16px;font-weight:600;font-size:15px;color:var(--ink);
  box-shadow:var(--sh-sm);
}
.sheet-date-input:focus{border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-soft)}
.x-days-row{display:flex;align-items:center;gap:10px;background:var(--sky-tint);border-radius:14px;padding:10px 14px}
.x-days-row span{font-weight:700;font-size:14px;color:var(--ink-soft)}
.x-days-input{
  width:72px;height:40px;border:1.5px solid var(--sky);border-radius:10px;background:#fff;
  padding:0 12px;font-weight:700;font-size:16px;color:var(--ink);text-align:center;
  box-shadow:0 0 0 3px var(--sky-soft);
}
.toggle-row{display:flex;align-items:center;gap:14px;padding:4px 0}
.toggle-lbl{flex:1;font-weight:700;font-size:15px;color:var(--ink)}
.toggle-sub{font-size:13px;font-weight:600;color:var(--muted);margin-top:2px}
.toggle-switch{position:relative;width:52px;height:30px;flex:0 0 52px}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{
  position:absolute;inset:0;border-radius:15px;background:var(--line);cursor:pointer;transition:background .2s;
}
.toggle-slider::after{content:"";position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:4px;left:4px;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.toggle-switch input:checked + .toggle-slider{background:var(--sky-deep)}
.toggle-switch input:checked + .toggle-slider::after{transform:translateX(22px)}
.detail-rows{display:flex;flex-direction:column;gap:2px;background:var(--page);border-radius:16px;padding:6px 0}
.detail-row{display:flex;align-items:center;gap:12px;padding:12px 16px}
.detail-row svg{width:17px;height:17px;color:var(--sky-deep);flex:0 0 17px}
.detail-row-label{font-size:13.5px;font-weight:600;color:var(--ink-soft)}
.detail-row-val{font-weight:700;font-size:15px;color:var(--ink);margin-left:auto}
.delay-date-wrap{display:flex;align-items:center;gap:10px}
.delay-date-wrap input[type=date]{
  flex:1;height:44px;border:1.5px solid var(--sky);border-radius:12px;
  padding:0 12px;font-weight:600;font-size:14px;color:var(--ink);
  box-shadow:0 0 0 3px var(--sky-soft);
}
.detail-btns{display:flex;gap:10px;margin-top:4px}
.detail-btn{
  flex:1;height:50px;border-radius:16px;font-weight:700;font-size:14.5px;
  display:flex;align-items:center;justify-content:center;gap:7px;
  border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);transition:all .12s;
}
.detail-btn svg{width:16px;height:16px}
.detail-btn.del-btn{border-color:var(--red);color:var(--red)}

/* ── modal ────────────────────────────────────────────────── */
#modal-layer{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;padding:24px}
#modal-layer.hidden{display:none}
#mdim{position:absolute;inset:0;background:rgba(20,46,66,.5);backdrop-filter:blur(2px)}
#mbox{
  position:relative;background:#fff;border-radius:30px;padding:28px 24px;
  width:100%;max-width:380px;box-shadow:var(--sh-lg);animation:modalIn .22s ease;max-height:82vh;overflow-y:auto;
}
@keyframes modalIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.mbox-icon{width:64px;height:64px;border-radius:22px;background:var(--sky-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.mbox-icon svg{width:32px;height:32px;color:var(--sky-deep)}
.mbox-title{font-family:var(--disp);font-weight:700;font-size:23px;color:var(--ink);text-align:center;margin-bottom:4px}
.mbox-sub{font-size:14px;font-weight:600;color:var(--ink-soft);text-align:center;line-height:1.5;margin-bottom:16px}
.mbox-addr{display:flex;align-items:center;justify-content:center;gap:5px;font-size:13.5px;font-weight:700;color:var(--sky-deep);margin-bottom:20px;cursor:pointer;text-align:center;flex-wrap:wrap}
.mbox-addr svg{width:14px;height:14px;flex:0 0 14px}
.mbox-btns{display:flex;gap:10px}
.mbox-btn{
  flex:1;height:52px;border-radius:16px;font-weight:700;font-size:15px;
  display:flex;align-items:center;justify-content:center;gap:7px;
  border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);transition:all .12s;
}
.mbox-btn svg{width:17px;height:17px}
.mbox-btn.primary-btn{background:linear-gradient(150deg,#3DC9F5,#16A6DC);border:none;color:#fff;box-shadow:0 10px 24px rgba(25,166,221,.35),inset 0 2px 0 rgba(255,255,255,.4)}
.star-row{display:flex;justify-content:center;gap:10px;margin:14px 0}
.star-btn{width:42px;height:42px;border-radius:14px;border:2px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.star-btn svg{width:22px;height:22px;color:var(--line)}
.star-btn.on{border-color:var(--gold);background:var(--gold-soft)}
.star-btn.on svg{color:var(--gold);fill:var(--gold)}
.modal-notes{width:100%;min-height:72px;border:1.5px solid var(--line);border-radius:var(--r-input);padding:12px 16px;font-size:15px;font-weight:500;color:var(--ink);resize:none;margin-bottom:4px}
.modal-notes::placeholder{color:var(--muted)}
.modal-notes:focus{border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-soft)}

/* ── tasks header scroll-collapse ─────────────────────────── */
.tasks-hdr{
  overflow:hidden;
  max-height:500px;
  transition:max-height .3s ease, padding-top .3s ease, padding-bottom .3s ease, box-shadow .3s ease, border-radius .3s ease;
}
.tasks-hdr.scrolled{
  max-height:0 !important;
  padding-top:0 !important;
  padding-bottom:0 !important;
  box-shadow:none !important;
  border-radius:0 !important;
}

/* ── mini floating header (appears when scrolled in tasks tab) */
#mini-hdr{
  position:absolute;top:0;left:0;right:0;z-index:45;
  padding:8px 16px 14px;
  background:linear-gradient(165deg,#33C6F4 0%,#15A8DC 100%);
  border-radius:0 0 26px 26px;
  box-shadow:0 12px 24px rgba(22,168,221,.28);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  transform:translateY(-110%);
  transition:transform .25s ease;
  pointer-events:none;
}
#mini-hdr.visible{transform:translateY(0);pointer-events:auto}
.mh-tabs{display:flex;gap:4px;background:rgba(255,255,255,.20);border-radius:var(--r-pill);padding:4px}
.mh-tab{
  height:36px;padding:0 16px;border:none;background:transparent;border-radius:var(--r-pill);
  font-family:var(--font);font-weight:700;font-size:13.5px;color:#fff;
  display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;
}
.mh-tab.active{background:#fff;color:var(--sky-deep);box-shadow:0 3px 8px rgba(0,40,70,.16)}
.mh-tab svg{width:15px;height:15px}
.mh-add-btn{
  width:42px;height:42px;flex:0 0 42px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.mh-add-btn:active{background:rgba(255,255,255,.38)}
.mh-add-btn svg{width:22px;height:22px;color:#fff}

/* ── stats screen ─────────────────────────────────────────── */
.stats-hdr-row{display:flex;align-items:baseline;justify-content:space-between;padding:14px 0 8px}
.stats-hdr-title{font-family:var(--disp);font-weight:600;font-size:17px;color:var(--ink)}

/* 8-week bar chart */
.week-chart{background:var(--card);border-radius:var(--r-card);padding:16px 14px 12px;box-shadow:var(--sh-sm)}
.wc-val-row{display:flex;gap:5px;margin-bottom:4px}
.wc-val{flex:1;font-size:10px;font-weight:700;color:var(--ink-soft);text-align:center}
.wc-chart-area{height:72px;display:flex;align-items:flex-end;gap:5px;margin-bottom:6px}
.wc-bar{flex:1;border-radius:5px 5px 0 0;background:rgba(43,194,242,.32);min-height:3px}
.wc-bar.wc-current{background:linear-gradient(180deg,#3DC9F5,#16A6DC);box-shadow:0 4px 12px rgba(25,166,221,.38)}
.wc-lbl-row{display:flex;gap:5px}
.wc-lbl{flex:1;font-size:9px;font-weight:700;color:var(--muted);text-align:center;line-height:1.2}

/* person stat cards */
.person-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.person-card{background:var(--card);border-radius:var(--r-card);padding:16px 14px 14px;box-shadow:var(--sh-sm);display:flex;flex-direction:column}
.pc-name-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.pc-avatar{width:32px;height:32px;border-radius:50%;background:var(--sky-soft);display:flex;align-items:center;justify-content:center;flex:0 0 32px}
.pc-avatar svg{width:16px;height:16px;color:var(--sky-deep)}
.pc-name{font-family:var(--disp);font-weight:700;font-size:16px;color:var(--ink)}
.pc-big{font-family:var(--disp);font-weight:700;font-size:28px;color:var(--ink);line-height:1}
.pc-lbl{font-size:11px;font-weight:700;color:var(--muted);margin-top:1px;margin-bottom:12px}
.pc-month-row{background:var(--sky-tint);border-radius:10px;padding:8px 10px;margin-bottom:10px}
.pc-month-val{font-family:var(--disp);font-weight:700;font-size:20px;color:var(--sky-deep)}
.pc-month-lbl{font-size:10.5px;font-weight:700;color:var(--muted)}
.pc-streak-pill{display:inline-flex;align-items:center;gap:5px;background:var(--gold-soft);border-radius:var(--r-pill);padding:5px 10px;align-self:flex-start}
.pc-streak-pill svg{width:12px;height:12px;color:var(--gold)}
.pc-streak-pill span{font-size:11.5px;font-weight:700;color:#8B6200}
.pc-top-task{margin-top:10px;padding:7px 10px;background:var(--page);border-radius:10px}
.pc-top-task-lbl{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.pc-top-task-val{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* head to head */
.h2h-card{background:var(--card);border-radius:var(--r-card);padding:18px 16px 14px;box-shadow:var(--sh-sm)}
.h2h-totals{display:flex;align-items:center;margin-bottom:12px}
.h2h-side{flex:1;text-align:center}
.h2h-person{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:3px}
.h2h-num{font-family:var(--disp);font-weight:700;font-size:32px;color:var(--ink);line-height:1}
.h2h-side.leading .h2h-num{color:var(--sky-deep)}
.h2h-vs{width:32px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);flex:0 0 32px}
.h2h-progress{height:8px;border-radius:4px;background:var(--line);overflow:hidden;display:flex;margin-bottom:14px}
.h2h-p1{height:100%;border-radius:4px 0 0 4px;background:var(--sky)}
.h2h-p2{height:100%;border-radius:0 4px 4px 0;background:var(--green)}
.h2h-stats{display:flex;flex-direction:column;border-top:1px solid var(--line)}
.h2h-stat{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
.h2h-stat:last-child{border-bottom:none}
.h2h-stat-v{width:52px;font-weight:700;font-size:14px;color:var(--ink);text-align:center}
.h2h-stat-v.win{color:var(--sky-deep)}
.h2h-stat-mid{flex:1;text-align:center;font-size:11.5px;font-weight:700;color:var(--muted)}
.h2h-badge{background:var(--sky-soft);border-radius:var(--r-pill);padding:6px 14px;font-size:12.5px;font-weight:700;color:var(--sky-deep);text-align:center;margin-top:10px}

/* difficulty bars */
.diff-card{background:var(--card);border-radius:var(--r-card);padding:14px 16px;box-shadow:var(--sh-sm)}
.diff-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.diff-dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
.diff-lbl{font-size:13px;font-weight:700;color:var(--ink);flex:0 0 54px}
.diff-track{flex:1;height:9px;border-radius:4.5px;background:var(--line);overflow:hidden}
.diff-fill{height:100%;border-radius:4.5px;transition:width .4s}
.diff-cnt{font-size:12px;font-weight:700;color:var(--muted);flex:0 0 28px;text-align:right}

/* most completed list */
.top-list{background:var(--card);border-radius:var(--r-card);padding:4px 16px;box-shadow:var(--sh-sm)}
.top-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.top-row:last-child{border-bottom:none}
.top-rank{font-family:var(--disp);font-weight:700;font-size:14px;color:var(--muted);width:18px;text-align:center;flex:0 0 18px}
.top-name{flex:1;font-size:13.5px;font-weight:600;color:var(--ink)}
.top-badge{background:var(--sky-soft);color:var(--sky-deep);border-radius:var(--r-pill);padding:3px 10px;font-size:11.5px;font-weight:700}
</style>
</head>

<script>
/* ════════════════════════════════════════ STATE & DEFAULTS */
firebase.initializeApp({
  apiKey:"AIzaSyA_ppt9Y5S4qqvb4Jr3unzvecxE9Pjg5QI",

const db = firebase.firestore();
const HOUSEHOLD = db.collection('households').doc('home');

let S = {};

const FREQ_DAYS = {daily:1, weekly:7, fortnightly:14, monthly:30};
const FREQ_LABELS = {daily:'Daily', weekly:'Weekly', fortnightly:'Fortnightly', monthly:'Monthly', custom:'Custom'};
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const ROOM_CHIPS = [
  {name:'Kitchen',             icon:'utensils'},
  {name:'Bathroom (Living)',   icon:'droplets'},
  {name:'Bathroom (Bedroom)',  icon:'droplets'},
  {name:'Bedroom',             icon:'bed'},
  {name:'Study Nook',          icon:'monitor'},
  {name:'Garage',              icon:'warehouse'},
  {name:"Ella's Study Room",   icon:'book-open'},
  {name:'Living Room',         icon:'sofa'},
  {name:'Laundry',             icon:'washing-machine'},
  {name:'Outdoor',             icon:'sun'},
];

function uid(){ return Math.random().toString(36).slice(2,9); }
function todayStr(){ return new Date().toISOString().split('T')[0]; }

function addDays(dateStr, n){
  const d = new Date(dateStr + 'T00:00:00'); d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function getWeekStart(d = new Date()){
  const day = d.getDay(), diff = d.getDate() - day + (day===0?-6:1);
  const m = new Date(d); m.setDate(diff); m.setHours(0,0,0,0);
  return m.toISOString().split('T')[0];
}
function weekLabel(ws){
  const s = new Date(ws+'T00:00:00'), e = new Date(s); e.setDate(e.getDate()+6);
  return `${MONTHS[s.getMonth()]} ${s.getDate()} — ${e.getDate()}`;
}
function greeting(){
  const h = new Date().getHours();
  return h<12 ? 'Good morning,' : h<17 ? 'Good afternoon,' : 'Good evening,';
}
function getFreqDays(task){
  if(task.frequency === 'custom') return task.customDays || 7;
  return FREQ_DAYS[task.frequency] || 7;
}
function freqLabel(task){
  if(task.frequency === 'custom') return `Every ${task.customDays||7} days`;
  return FREQ_LABELS[task.frequency] || 'Weekly';
}

function dayLabelFor(dateStr){
  const t = todayStr();
  if(dateStr === t) return 'Today';
  if(dateStr === addDays(t, 1)) return 'Tomorrow';
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((d - new Date(t+'T00:00:00')) / 86400000);
  if(diff > 0 && diff < 7) return DAYS[d.getDay()];
  return `${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
function shortDateStr(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
function dueDateDisplay(dateStr){
  const t = todayStr();
  if(dateStr < t)  return {cls:'due-overdue', text:'Overdue'};
  if(dateStr === t) return {cls:'due-today',   text:'Due today'};
  if(dateStr === addDays(t,1)) return {cls:'due-soon', text:'Due tomorrow'};
  const d = new Date(dateStr+'T00:00:00');
  return {cls:'due-soon', text:`Due ${d.getDate()} ${MONTHS[d.getMonth()]}`};
}

function taskIcon(task){
  const n = task.name.toLowerCase();
  if(task.isDeepClean) return 'sparkles';
  if(/kitchen|cook|dish|oven/i.test(n))          return 'utensils';
  if(/bath|toilet|shower|basin/i.test(n))         return 'droplets';
  if(/vacuum|sweep|mop|floor|dust/i.test(n))      return 'wind';
  if(/laundry|wash|sheet|linen/i.test(n))         return 'washing-machine';
  if(/bin|rubbish|trash|shop|errand|buy/i.test(n))return 'shopping-bag';
  if(/garden|mow|lawn|outdoor/i.test(n))          return 'sun';
  return 'list-checks';
}

function gcalLink(task){
  const start = task.dueDate.replace(/-/g,'');
  const end   = addDays(task.dueDate, 1).replace(/-/g,'');
  const details = `${freqLabel(task)} · ${task.difficulty}${task.isDeepClean?' · Deep Clean':''}${task.room?' · '+task.room:''}`;
  let recur = '';
  if(task.frequency==='daily')            recur='&recur=RRULE:FREQ=DAILY';
  else if(task.frequency==='weekly')      recur='&recur=RRULE:FREQ=WEEKLY';
  else if(task.frequency==='fortnightly') recur='&recur=RRULE:FREQ=WEEKLY;INTERVAL=2';
  else if(task.frequency==='monthly')     recur='&recur=RRULE:FREQ=MONTHLY';
  else if(task.frequency==='custom'&&task.customDays) recur=`&recur=RRULE:FREQ=DAILY;INTERVAL=${task.customDays}`;
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(task.name)}&dates=${start}/${end}&details=${encodeURIComponent(details)}${recur}`;
}
function shouldShowCal(task){
  return task.assignee === 'Both' || task.assignee === S.name1;
}

/* ════════════════════════════════════════ STORAGE */
const LS_KEY = 'ht-v3';
function saveLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){} }
function loadLocal(){
  try{ const d = localStorage.getItem(LS_KEY); if(d) return JSON.parse(d); }catch(e){}
  return null;
}
function save(){ HOUSEHOLD.set(S); saveLocal(); }
function defaultState(){ return {name1:'Zac',name2:'Ella',setup:false,tasks:makeDefaultTasks(),completedLog:[],dates:{toVisit:[],visited:[]},email1:'',email2:''}; }
function makeDefaultTasks(){
  const t = todayStr();
  return [
    {id:uid(), name:'Clean kitchen',     assignee:'Zac',  frequency:'weekly',      customDays:7,  dueDate:t,              difficulty:'Easy',   isDeepClean:false, room:'Kitchen'},
    {id:uid(), name:'Vacuum living room',assignee:'Both', frequency:'weekly',      customDays:7,  dueDate:addDays(t,1),   difficulty:'Easy',   isDeepClean:false, room:'Living Room'},
    {id:uid(), name:'Clean bathrooms',   assignee:'Ella', frequency:'fortnightly', customDays:14, dueDate:addDays(t,2),   difficulty:'Medium', isDeepClean:true,  room:'Bathroom (Living)'},
    {id:uid(), name:'Do the laundry',    assignee:'Both', frequency:'weekly',      customDays:7,  dueDate:addDays(t,3),   difficulty:'Easy',   isDeepClean:false, room:'Laundry'},
    {id:uid(), name:'Take out bins',     assignee:'Zac',  frequency:'weekly',      customDays:7,  dueDate:addDays(t,4),   difficulty:'Easy',   isDeepClean:false, room:'Outdoor'},
    {id:uid(), name:'Mop floors',        assignee:'Ella', frequency:'fortnightly', customDays:14, dueDate:addDays(t,5),   difficulty:'Medium', isDeepClean:false, room:'Living Room'},
  ];
}

/* ════════════════════════════════════════ PROGRESS */
function weekProgress(){
  const ws = getWeekStart(), we = addDays(ws, 6);
  const doneThisWeek = (S.completedLog||[]).filter(l => l.completedAt >= ws && l.completedAt <= we).length;
  const pendingThisWeek = S.tasks.filter(t => t.dueDate >= ws && t.dueDate <= we).length;
  const total = doneThisWeek + pendingThisWeek;
  const pct   = total ? Math.round(doneThisWeek/total*100) : 0;
  return {done: doneThisWeek, total, pct};
}

function ringHTML(pct, r=33, size=78, sw=9, trackColor='rgba(255,255,255,.28)', fillColor='#fff'){
  const C = 2*Math.PI*r, off = C*(1-pct/100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${trackColor}" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${fillColor}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
  </svg>`;
}

/* ════════════════════════════════════════ TASKS TAB */
function updateMiniHdr(){
  const isRooms = tasksSubView==='rooms'||tasksSubView==='roomDetail';
  document.getElementById('mh-tasks-btn')?.classList.toggle('active', !isRooms);
  document.getElementById('mh-rooms-btn')?.classList.toggle('active', isRooms);
}

function renderTasks(){
  const inRooms = tasksSubView==='rooms'||tasksSubView==='roomDetail';
  const inHist  = tasksSubView==='history';
  const prog = weekProgress();
  document.getElementById('hdr').innerHTML = `
    <div class="tasks-hdr">
      <div class="hh-top">
        <div>
          <div class="hh-hello">${greeting()}</div>
          <div class="hh-name">${S.name1}</div>
        </div>
        <div class="hh-avatar"><i data-lucide="user-round"></i></div>
      </div>
      <div class="progress-card">
        <div class="ring">${ringHTML(prog.pct,33,78,9,'rgba(255,255,255,.35)','#fff')}<div class="pct"><b>${prog.pct}%</b><span>DONE</span></div></div>
        <div class="prog-meta">
          <div class="wk">This week</div>
          <div class="big">${weekLabel(getWeekStart())}</div>
          <div class="sub"><b>${prog.done} of ${prog.total}</b> done this week</div>
        </div>
      </div>
    </div>`;
  lucide.createIcons();
  if(inHist)                                      _renderHistoryPanel();
  else if(tasksSubView==='rooms')                 _renderRoomsPanel();
  else if(tasksSubView==='roomDetail'&&currentRoomDetail) _renderRoomDetailPanel(currentRoomDetail);
  else                                            _renderTasksPanel();
  updateMiniHdr();
}
function _tabsRowHTML(activeTab){
  const t = activeTab==='tasks', r = activeTab==='rooms';
  return `<div class="tasks-view-row">
    <div class="tasks-view-chips">
      <button class="tv-chip${t?' sel':''}" id="view-tasks"><i data-lucide="list-checks"></i>Tasks</button>
      <button class="tv-chip${r?' sel':''}" id="view-rooms"><i data-lucide="layout-grid"></i>Rooms</button>
    </div>
    <button class="tab-add-btn" id="hdr-add"><i data-lucide="plus"></i></button>
  </div>`;
}
function _bindTabListeners(){
  const a=document.getElementById('hdr-add'); if(a) a.onclick=openAddTaskSheet;
  const t=document.getElementById('view-tasks'); if(t) t.onclick=()=>{ tasksSubView='tasks'; currentRoomDetail=null; renderTasks(); };
  const r=document.getElementById('view-rooms'); if(r) r.onclick=()=>{ tasksSubView='rooms'; currentRoomDetail=null; renderTasks(); };
}
function _renderTasksPanel(){
  const t = todayStr();
  const overdue  = S.tasks.filter(x=>x.dueDate<t).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const upcoming = S.tasks.filter(x=>x.dueDate>=t).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const byDate = {};
  upcoming.forEach(x=>{ (byDate[x.dueDate]=byDate[x.dueDate]||[]).push(x); });
  let html = _tabsRowHTML('tasks');
  if(overdue.length){
    html += `<div class="day-header"><div class="day-label overdue-lbl">Overdue</div></div>`;
    overdue.forEach(x=>{ html+=taskCardHTML(x); });
  }
  const dates = Object.keys(byDate).sort();
  if(!dates.length&&!overdue.length){
    html += `<div class="empty-state"><i data-lucide="check-circle-2"></i><p>All clear! Tap + to add tasks.</p></div>`;
  }
  dates.forEach(date=>{
    const isToday = date===t;
    html += `<div class="day-header">
      <div class="day-label ${isToday?'today-lbl':''}">${dayLabelFor(date)}</div>
      <div class="day-date-pill">${shortDateStr(date)}</div>
    </div>`;
    byDate[date].forEach(x=>{ html+=taskCardHTML(x); });
  });
  document.getElementById('panel').innerHTML = html;
  lucide.createIcons();
  _bindTabListeners();
  document.querySelectorAll('[data-done]').forEach(btn=>btn.addEventListener('click',e=>{ e.stopPropagation(); completeTask(btn.dataset.done); }));
  document.querySelectorAll('[data-skip]').forEach(btn=>btn.addEventListener('click',e=>{ e.stopPropagation(); skipTask(btn.dataset.skip); }));
  document.querySelectorAll('[data-task-card]').forEach(card=>card.addEventListener('click',e=>{ if(e.target.closest('button,a')) return; openTaskDetail(card.dataset.taskCard); }));
}
function _renderHistoryPanel(){
  const log = S.completedLog||[];
  if(!log.length){
    document.getElementById('panel').innerHTML=`<div class="empty-state"><i data-lucide="history"></i><p>No history yet — complete your first task!</p></div>`;
    lucide.createIcons(); return;
  }
  const byWeek = {};
  log.forEach(l=>{ const ws=getWeekStart(new Date(l.completedAt+'T00:00:00')); (byWeek[ws]=byWeek[ws]||[]).push(l); });
  const ws = getWeekStart();
  const prog = weekProgress();
  const thisWeekItems = byWeek[ws]||[];
  let html = '<div style="padding-top:6px"></div>';
  html += `<div class="hist-card">
    <div class="hist-week"><span>${weekLabel(ws)} <b style="color:var(--sky-deep)">· This week</b></span><span class="hist-pct">${prog.pct}%</span></div>
    <div class="hist-bar"><i style="width:${prog.pct}%"></i></div>
    <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">${prog.done} done · ${prog.total-prog.done} pending</div>
    <div class="hist-items">
      ${thisWeekItems.map(l=>histItem(l)).join('')}
      ${!thisWeekItems.length?'<div style="color:var(--muted);font-size:13.5px;font-weight:600">None completed yet this week</div>':''}
    </div>
  </div>`;
  Object.keys(byWeek).filter(w=>w!==ws).sort().reverse().forEach(weekStart=>{
    const items=byWeek[weekStart];
    html+=`<div class="hist-card">
      <div class="hist-week"><span>${weekLabel(weekStart)}</span><span style="font-weight:700;color:var(--green)">${items.length} done</span></div>
      <div class="hist-items">${items.map(l=>histItem(l)).join('')}</div>
    </div>`;
  });
  document.getElementById('panel').innerHTML = html;
  lucide.createIcons();
}
function _renderRoomsPanel(){
  let html = _tabsRowHTML('rooms');
  html += '<div class="room-grid">';
  ROOM_CHIPS.forEach(room=>{
    const count = S.tasks.filter(t=>t.room===room.name).length;
    html += `<div class="room-tile" data-room-nav="${room.name}">
      <div class="room-badge ${count===0?'zero':''}">${count}</div>
      <div class="room-tile-icon"><i data-lucide="${room.icon}"></i></div>
      <div class="room-tile-name">${room.name}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('panel').innerHTML = html;
  lucide.createIcons();
  _bindTabListeners();
  document.querySelectorAll('[data-room-nav]').forEach(tile=>{
    tile.addEventListener('click',()=>{ tasksSubView='roomDetail'; currentRoomDetail=tile.dataset.roomNav; renderTasks(); });
  });
}
function _renderRoomDetailPanel(roomName){
  const room = ROOM_CHIPS.find(r=>r.name===roomName);
  const tasks = S.tasks.filter(t=>t.room===roomName).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const t = todayStr();
  let html = _tabsRowHTML('rooms');
  html += `<button class="room-back" id="room-back-btn"><i data-lucide="arrow-left"></i>${roomName}</button>`;
  if(!tasks.length){
    html += `<div class="empty-state"><i data-lucide="${room?room.icon:'layout-grid'}"></i><p>No tasks in ${roomName}</p></div>`;
  } else {
    const overdue  = tasks.filter(x=>x.dueDate<t);
    const upcoming = tasks.filter(x=>x.dueDate>=t);
    if(overdue.length){ html+=`<div class="day-header"><div class="day-label" style="color:var(--red)">Overdue</div></div>`; overdue.forEach(x=>{html+=taskCardHTML(x);}); }
    upcoming.forEach(x=>{html+=taskCardHTML(x);});
  }
  document.getElementById('panel').innerHTML = html;
  lucide.createIcons();
  _bindTabListeners();
  document.getElementById('room-back-btn').onclick=()=>{ tasksSubView='rooms'; currentRoomDetail=null; renderTasks(); };
  document.querySelectorAll('[data-done]').forEach(btn=>btn.addEventListener('click',e=>{ e.stopPropagation(); completeTask(btn.dataset.done); }));
  document.querySelectorAll('[data-skip]').forEach(btn=>btn.addEventListener('click',e=>{ e.stopPropagation(); skipTask(btn.dataset.skip); }));
  document.querySelectorAll('[data-task-card]').forEach(card=>card.addEventListener('click',e=>{ if(e.target.closest('button,a')) return; openTaskDetail(card.dataset.taskCard); }));
}

function taskCardHTML(task){
  const diff  = task.difficulty || 'Easy';
  const cls   = {Easy:'easy', Medium:'medium', Hard:'hard'}[diff] || 'easy';
  const due   = dueDateDisplay(task.dueDate);

  return `<div class="task-card ${cls}" data-task-card="${task.id}">
    <div class="tc-inner">
      <div class="tc-top">
        <div class="tc-icon"><i data-lucide="${taskIcon(task)}"></i></div>
        <div class="tc-main">

            <span class="badge badge-who"><i data-lucide="user"></i>${task.assignee}</span>
            <span class="badge badge-freq">${freqLabel(task)}</span>
            ${task.isDeepClean ? '<span class="badge badge-dc"><i data-lucide="sparkles"></i>Deep clean</span>' : ''}
          </div>
          <div class="tc-due ${due.cls}">
            <i data-lucide="calendar"></i>${due.text}
          </div>
        </div>
        <div class="tc-diff"><div class="diff-dot"></div></div>
      </div>
      <div class="tc-actions">
        <button class="tc-act" data-skip="${task.id}"><i data-lucide="skip-forward"></i>Skip</button>
        <button class="tc-act done-act" data-done="${task.id}"><i data-lucide="check"></i>Done</button>
      </div>
    </div>
  </div>`;
}

function completeTask(id){
  const task = S.tasks.find(t=>t.id===id); if(!task) return;
  S.completedLog.push({
    id:uid(), taskId:id, name:task.name,
    completedAt:todayStr(), difficulty:task.difficulty,
    assignee:task.assignee, isDeepClean:task.isDeepClean
  });
  task.dueDate = addDays(task.dueDate, getFreqDays(task));
  save(); renderTasks();
}
function skipTask(id){
  const task = S.tasks.find(t=>t.id===id); if(!task) return;
  task.dueDate = addDays(task.dueDate, getFreqDays(task));
  save(); renderTasks();
}

/* ════════════════════════════════════════ HISTORY TAB */
function histItem(l){
  const dc = {Easy:'hi-easy', Medium:'hi-medium', Hard:'hi-hard'}[l.difficulty]||'hi-easy';
  return `<div class="hist-item">
    <i data-lucide="check-circle-2" style="color:var(--green)"></i>
    <span class="hi-name">${l.name}</span>
    <span class="hi-diff ${dc}">${l.difficulty}</span>
    <span style="font-size:11.5px;font-weight:700;color:var(--muted)">${l.assignee}</span>
  </div>`;
}

function renderHistory(){
  document.getElementById('hdr').innerHTML = `
    <div class="flat-hdr">
      <div><div class="flat-hdr-title">Stats</div><div class="flat-hdr-sub">Household insights</div></div>
      <div class="flat-hdr-icon"><i data-lucide="bar-chart-2"></i></div>
    </div>`;

  const log = S.completedLog || [];
  if(!log.length){
    document.getElementById('panel').innerHTML = `<div class="empty-state"><i data-lucide="bar-chart-2"></i><p>No history yet — complete your first task!</p></div>`;
    lucide.createIcons(); return;
  }

  const ws     = getWeekStart();
  const prog   = weekProgress();
  const name1  = S.name1, name2 = S.name2;
  const now    = new Date();
  const monthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  /* ── helpers ── */
  function mineLog(name){ return log.filter(l => l.assignee===name || l.assignee==='Both'); }

  function calcStreak(name){
    // If nothing done this week, start counting from last week so Monday mornings don't kill the streak
    const curHas = log.some(l => (l.assignee===name||l.assignee==='Both') && l.completedAt>=ws && l.completedAt<=addDays(ws,6));
    const start  = curHas ? 0 : 1;
    let streak = 0;
    for(let i=start; i<52; i++){
      const d  = new Date(ws+'T00:00:00'); d.setDate(d.getDate() - i*7);
      const wS = d.toISOString().split('T')[0], wE = addDays(wS,6);
      const has = log.some(l => (l.assignee===name||l.assignee==='Both') && l.completedAt>=wS && l.completedAt<=wE);
      if(has) streak++; else break;
    }
    return streak;
  }

  function topTask(name){
    const map = {};
    mineLog(name).forEach(l => { map[l.name] = (map[l.name]||0)+1; });
    const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);
    return entries[0] || null;
  }

  /* ── 1. Current week card ── */
  const thisWeekItems = log.filter(l => l.completedAt>=ws && l.completedAt<=addDays(ws,6));

  let html = `<div style="padding:6px 16px 0">
    <div class="hist-card">
      <div class="hist-week">
        <span>${weekLabel(ws)} <b style="color:var(--sky-deep)">· This week</b></span>
        <span class="hist-pct">${prog.pct}%</span>
      </div>
      <div class="hist-bar"><i style="width:${prog.pct}%"></i></div>
      <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">${prog.done} done · ${prog.total - prog.done} pending</div>
      <div class="hist-items">
        ${thisWeekItems.map(l=>histItem(l)).join('')}
        ${!thisWeekItems.length ? '<div style="color:var(--muted);font-size:13.5px;font-weight:600">None completed yet this week</div>' : ''}
      </div>
    </div>
  </div>`;

  /* ── 2. 8-week completion bar chart ── */
  const weeks = [];
  for(let i=7; i>=0; i--){
    const d  = new Date(ws+'T00:00:00'); d.setDate(d.getDate() - i*7);
    const wS = d.toISOString().split('T')[0], wE = addDays(wS,6);
    weeks.push({ wS, done: log.filter(l=>l.completedAt>=wS&&l.completedAt<=wE).length, isCurrent: i===0 });
  }
  const maxDone = Math.max(...weeks.map(w=>w.done), 1);
  const BAR_MAX = 72;

  html += `<div style="padding:0 16px">
    <div class="stats-hdr-row"><span class="stats-hdr-title">8-Week Completions</span></div>
    <div class="week-chart">
      <div class="wc-val-row">${weeks.map(w=>`<div class="wc-val">${w.done||''}</div>`).join('')}</div>
      <div class="wc-chart-area">${weeks.map(w=>`
        <div class="wc-bar${w.isCurrent?' wc-current':''}" style="height:${Math.max(3,Math.round(w.done/maxDone*BAR_MAX))}px"></div>`).join('')}
      </div>
      <div class="wc-lbl-row">${weeks.map(w=>{
        const mo = new Date(w.wS+'T00:00:00');
        return `<div class="wc-lbl">${w.isCurrent ? 'Now' : MONTHS[mo.getMonth()]+' '+mo.getDate()}</div>`;
      }).join('')}</div>
    </div>
  </div>`;

  /* ── 3. Personal stats ── */
  function buildStats(name){
    const mine = mineLog(name);
    return {
      total:  mine.length,
      month:  mine.filter(l=>l.completedAt.startsWith(monthStr)).length,
      streak: calcStreak(name),
      top:    topTask(name)
    };
  }
  const s1 = buildStats(name1), s2 = buildStats(name2);

  function personCardHTML(name, st){
    return `<div class="person-card">
      <div class="pc-name-row">
        <div class="pc-avatar"><i data-lucide="user-round"></i></div>
        <div class="pc-name">${name}</div>
      </div>
      <div class="pc-big">${st.total}</div>
      <div class="pc-lbl">All-time done</div>
      <div class="pc-month-row">
        <div class="pc-month-val">${st.month}</div>
        <div class="pc-month-lbl">This month</div>
      </div>
      <div class="pc-streak-pill">
        <i data-lucide="flame"></i>
        <span>${st.streak}w streak</span>
      </div>
      ${st.top ? `<div class="pc-top-task">
        <div class="pc-top-task-lbl">Top task</div>
        <div class="pc-top-task-val">${st.top[0]}</div>
      </div>` : ''}
    </div>`;
  }

  html += `<div style="padding:0 16px">
    <div class="stats-hdr-row"><span class="stats-hdr-title">Personal Stats</span></div>
    <div class="person-cards">${personCardHTML(name1,s1)}${personCardHTML(name2,s2)}</div>
  </div>`;

  /* ── 4. Head to head ── */
  const t1 = s1.total, t2 = s2.total, tot = t1+t2||1;
  const p1pct = Math.round(t1/tot*100);
  const m1 = s1.month, m2 = s2.month;
  const monthLeader = m1>m2 ? name1 : m2>m1 ? name2 : null;

  html += `<div style="padding:0 16px">
    <div class="stats-hdr-row"><span class="stats-hdr-title">Head to Head</span></div>
    <div class="h2h-card">
      <div class="h2h-totals">
        <div class="h2h-side ${t1>=t2?'leading':''}">
          <div class="h2h-person">${name1}</div>
          <div class="h2h-num">${t1}</div>
        </div>
        <div class="h2h-vs">VS</div>
        <div class="h2h-side ${t2>=t1?'leading':''}">
          <div class="h2h-person">${name2}</div>
          <div class="h2h-num">${t2}</div>
        </div>
      </div>
      <div class="h2h-progress">
        <div class="h2h-p1" style="width:${p1pct}%"></div>
        <div class="h2h-p2" style="width:${100-p1pct}%"></div>
      </div>
      <div class="h2h-stats">
        <div class="h2h-stat">
          <div class="h2h-stat-v ${m1>m2?'win':''}">${m1}</div>
          <div class="h2h-stat-mid">This month</div>
          <div class="h2h-stat-v ${m2>m1?'win':''}">${m2}</div>
        </div>
        <div class="h2h-stat">
          <div class="h2h-stat-v ${s1.streak>s2.streak?'win':''}">${s1.streak}w</div>
          <div class="h2h-stat-mid">Streak</div>
          <div class="h2h-stat-v ${s2.streak>s1.streak?'win':''}">${s2.streak}w</div>
        </div>
      </div>
      <div class="h2h-badge" style="${!monthLeader?'background:var(--line);color:var(--ink-soft)':''}">
        ${monthLeader ? '🏆 '+monthLeader+' leading this month' : 'Tied this month'}
      </div>
    </div>
  </div>`;

  /* ── 5. Difficulty breakdown ── */
  const diffs = {Easy:0, Medium:0, Hard:0};
  log.forEach(l => { if(diffs[l.difficulty]!==undefined) diffs[l.difficulty]++; });
  const maxDiff = Math.max(...Object.values(diffs), 1);
  const diffColor = {Easy:'var(--green)', Medium:'var(--gold)', Hard:'var(--red)'};

  html += `<div style="padding:0 16px">
    <div class="stats-hdr-row"><span class="stats-hdr-title">By Difficulty</span></div>
    <div class="diff-card">
      ${Object.entries(diffs).map(([d,n]) => `
      <div class="diff-row">
        <div class="diff-dot" style="background:${diffColor[d]}"></div>
        <div class="diff-lbl">${d}</div>
        <div class="diff-track"><div class="diff-fill" style="width:${Math.round(n/maxDiff*100)}%;background:${diffColor[d]}"></div></div>
        <div class="diff-cnt">${n}</div>
      </div>`).join('')}
    </div>
  </div>`;

  /* ── 6. Most completed tasks ── */
  const taskMap = {};
  log.forEach(l => { taskMap[l.name] = (taskMap[l.name]||0)+1; });
  const topTasks = Object.entries(taskMap).sort((a,b)=>b[1]-a[1]).slice(0,6);

  if(topTasks.length){
    html += `<div style="padding:0 16px 8px">
      <div class="stats-hdr-row"><span class="stats-hdr-title">Most Completed</span></div>
      <div class="top-list">
        ${topTasks.map(([name,count],i) => `
        <div class="top-row">
          <div class="top-rank">${i+1}</div>
          <div class="top-name">${name}</div>
          <div class="top-badge">${count}×</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('panel').innerHTML = html;
  lucide.createIcons();
}

function renderCalendar(){

  const t = todayStr();

    .sort((a,b) => a.dueDate.localeCompare(b.dueDate));

  const byDate = {};
  relevant.forEach(x => { (byDate[x.dueDate] = byDate[x.dueDate]||[]).push(x); });

  document.getElementById('panel').innerHTML = html;
  lucide.createIcons();

let searchBias = {lat:-37.8136, lon:144.9631, label:'Melbourne'};

async function resolveSuburb(q){
  try{
    // Append state/country context to improve postcode resolution
    const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q+' Victoria Australia')}&limit=3&lat=-37.8136&lon=144.9631`;
    const data = await fetch(url).then(r=>r.json());
    const f = data.features.find(f => {
      const c = f.properties.country||'';
      return !c || c==='Australia';
    });
    if(f) return {lat:f.geometry.coordinates[1], lon:f.geometry.coordinates[0]};
  }catch(e){}
  return null;
}

function renderDates(){
  document.getElementById('hdr').innerHTML = `
    <div class="flat-hdr">
      <div><div class="flat-hdr-title">Date Night</div><div class="flat-hdr-sub">Find your next spot</div></div>
      <div class="flat-hdr-icon"><i data-lucide="heart"></i></div>
    </div>`;

  const toVisit = S.dates.toVisit;
  const visited = S.dates.visited;

  let html = `
    <button class="pick-hero" id="pick-btn"><i data-lucide="dice-5"></i>Gamble Your Date</button>
    <div class="search-wrap-row">
      <div class="search-box">
        <i data-lucide="search"></i>
        <input class="search-input" id="date-search" placeholder="Restaurant, bar, cuisine…" autocomplete="off">
      </div>
    </div>
    <div class="search-loc-bar">
      <i data-lucide="map-pin"></i>
      <span class="search-loc-lbl">Near</span>
      <input class="search-loc-input" id="loc-input" placeholder="Suburb or postcode" value="${searchBias.label}" autocomplete="off">
    </div>
    <div id="search-results-panel" class="search-results-panel"></div>`;

  // To Visit
  html += `<div class="sec-row"><div class="sec-title">To Visit</div><span class="sec-count">${toVisit.length} places</span></div>`;
  if(!toVisit.length){
    html += `<div class="empty-state" style="padding:20px 24px"><i data-lucide="map-pin"></i><p>Search for restaurants to build your list</p></div>`;
  } else {
    toVisit.forEach(p => { html += toVisitCard(p); });
  }

  // Visited
  if(visited.length){
    html += `<div class="sec-row"><div class="sec-title">Visited</div>
      <button class="export-btn" id="export-btn" style="width:auto;border:none;background:none;box-shadow:none;padding:0;font-size:13px"><i data-lucide="download"></i>Export</button></div>`;
    visited.forEach(p => { html += visitedCard(p); });
  }

  document.getElementById('panel').innerHTML = html;
  lucide.createIcons();

  // Gamble Your Date — spin wheel
  document.getElementById('pick-btn').onclick = () => {
    if(!toVisit.length){ alert('Add some places to visit first!'); return; }
    openWheelOverlay(toVisit);
  };

  // Venue search
  let timer;
  document.getElementById('date-search').addEventListener('input', e => {
    clearTimeout(timer);
    const q = e.target.value.trim();
    if(q.length < 2){ document.getElementById('search-results-panel').style.display='none'; return; }
    timer = setTimeout(() => photonSearch(q), 380);
  });

  // Location bias — suburb or postcode
  let locTimer;
  document.getElementById('loc-input').addEventListener('input', e => {
    clearTimeout(locTimer);
    const q = e.target.value.trim();
    if(!q){ searchBias = {lat:-37.8136, lon:144.9631, label:'Melbourne'}; return; }
    locTimer = setTimeout(async () => {
      const coords = await resolveSuburb(q);
      if(coords) searchBias = {...coords, label:q};
      const sq = document.getElementById('date-search')?.value.trim();
      if(sq && sq.length >= 2) photonSearch(sq);
    }, 600);
  });

  // Mark visited
  document.querySelectorAll('[data-visit-it]').forEach(btn => btn.addEventListener('click', () => {
    openRateSheet(btn.dataset.visitIt);
  }));
  // Del to-visit
  document.querySelectorAll('[data-del-place]').forEach(btn => btn.addEventListener('click', () => {
    S.dates.toVisit = S.dates.toVisit.filter(p=>p.id!==btn.dataset.delPlace);
    save(); renderDates();
  }));
  // Del visited
  document.querySelectorAll('[data-del-visited]').forEach(btn => btn.addEventListener('click', () => {
    S.dates.visited = S.dates.visited.filter(p=>p.id!==btn.dataset.delVisited);
    save(); renderDates();
  }));
  // Maps links
  document.querySelectorAll('[data-maps]').forEach(el => el.addEventListener('click', () => {
    window.open('https://maps.google.com/?q='+encodeURIComponent(el.dataset.maps), '_blank');
  }));

  const expBtn = document.getElementById('export-btn');
  if(expBtn) expBtn.onclick = exportVisited;
}
